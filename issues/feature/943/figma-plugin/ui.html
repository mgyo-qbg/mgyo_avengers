<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F9F9; font-size: 13px; color: #030303;
    }
    .tabs { display: flex; border-bottom: 1px solid #E0E0E0; background: white; }
    .tab {
      flex: 1; padding: 10px 0; text-align: center; font-size: 12px;
      font-weight: 600; cursor: pointer; color: #A1A1A1; border-bottom: 2px solid transparent;
    }
    .tab.active { color: #2E9BFF; border-bottom-color: #2E9BFF; }
    .panel { display: none; padding: 14px 16px; }
    .panel.active { display: block; }
    h2 { font-size: 14px; font-weight: 700; color: #2E9BFF; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #6D6D6D; margin-bottom: 14px; line-height: 1.5; }
    .section {
      background: white; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 10px; border: 1px solid #E0E0E0;
      max-height: 200px; overflow-y: auto;
    }
    .section-title { font-size: 10px; font-weight: 600; color: #A1A1A1;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; margin-bottom: 5px; cursor: pointer;
    }
    label:last-child { margin-bottom: 0; }
    input[type="checkbox"] { width: 13px; height: 13px; accent-color: #2E9BFF; flex-shrink: 0; }
    .btn-group { display: flex; gap: 8px; margin-top: 4px; }
    .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .btn-sm {
      font-size: 10px; padding: 4px 8px; border: 1px solid #E0E0E0;
      border-radius: 4px; background: white; cursor: pointer; color: #6D6D6D;
    }
    .btn-sm:hover { background: #F2F2F2; }
    button {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #2E9BFF; color: white; }
    .btn-cancel  { background: #F2F2F2; color: #6D6D6D; }
    .status { font-size: 11px; color: #3AD1A9; margin-top: 8px; min-height: 14px; text-align: center; }
    .status.error { color: #FF5247; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #6D6D6D; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('pages')">페이지 스케치</div>
    <div class="tab" onclick="switchTab('flowchart')">플로우차트</div>
  </div>

  <!-- 페이지 스케치 패널 -->
  <div class="panel active" id="panel-pages">
    <h2>#1114 인출설계 설문지</h2>
    <p class="sub">선택한 페이지를 현재 캔버스에 생성합니다.<br>375 x 812pt, 가로 400px 간격 배치</p>
    <div class="btn-row">
      <button class="btn-sm" onclick="checkList([1,3])">진입 P1,P3</button>
      <button class="btn-sm" onclick="checkRange(4,8)">설문 4~8</button>
      <button class="btn-sm" onclick="checkRange(9,13)">설문 9~13</button>
      <button class="btn-sm" onclick="checkRange(14,16)">후처리 14~16</button>
      <button class="btn-sm" onclick="checkAll()">전체</button>
      <button class="btn-sm" onclick="uncheckAll()">해제</button>
    </div>
    <div class="section">
      <div class="section-title">진입/조건 (P1, P3)</div>
      <label><input type="checkbox" value="1" class="pg" checked> P1. 설문 시작</label>
      <label><input type="checkbox" value="3" class="pg"> P3. 자산없음 경고</label>
      <div class="section-title" style="margin-top:8px">설문 입력 (P4~P13, 1/8~8/8)</div>
      <label><input type="checkbox" value="4" class="pg" checked> P4. 은퇴시기/기대수명/생활비 (1/8)</label>
      <label><input type="checkbox" value="5" class="pg"> P5. 국민연금 Y/N (2/8)</label>
      <label><input type="checkbox" value="6" class="pg"> P6. 국민연금 계산기 (3/8)</label>
      <label><input type="checkbox" value="7" class="pg"> P7. 국민연금 직접입력 (3/8)</label>
      <label><input type="checkbox" value="8" class="pg"> P8. IRP/DC 자산 확인 (4/8)</label>
      <label><input type="checkbox" value="9" class="pg"> P9. 근로소득자 여부 (5/8)</label>
      <label><input type="checkbox" value="10" class="pg"> P10. 연봉/근속연수 (6/8)</label>
      <label><input type="checkbox" value="11" class="pg"> P11. 기타 정기소득 여부 (7/8)</label>
      <label><input type="checkbox" value="12" class="pg"> P12. 기타 정기소득 입력 (7/8)</label>
      <label><input type="checkbox" value="13" class="pg"> P13. 결과 확인 (8/8)</label>
      <div class="section-title" style="margin-top:8px">후처리 (P14~P16)</div>
      <label><input type="checkbox" value="14" class="pg"> P14. T0054 약관동의</label>
      <label><input type="checkbox" value="15" class="pg"> P15. 전송 로딩</label>
      <label><input type="checkbox" value="16" class="pg"> P16. 전달 완료</label>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="create">생성하기</button>
      <button class="btn-cancel"  id="cancel">취소</button>
    </div>
    <div class="status" id="status-pages"></div>
  </div>

  <!-- 플로우차트 패널 -->
  <div class="panel" id="panel-flowchart">
    <h2>인출설계 플로우차트</h2>
    <p class="sub">#1114 확정 플로우 (2026-03-09)<br>현재 페이지에 플로우차트를 생성합니다.</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2EC972"></div>시작/종료</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2E9BFF"></div>페이지</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F5BD0D"></div>분기(결정)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF5247"></div>경고/종료</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7C6AF5"></div>자동처리</div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="create-fc">플로우차트 생성</button>
      <button class="btn-cancel"  id="cancel-fc">취소</button>
    </div>
    <div class="status" id="status-fc"></div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (i===0 && tab==='pages') || (i===1 && tab==='flowchart'));
      });
      document.getElementById('panel-pages').classList.toggle('active', tab==='pages');
      document.getElementById('panel-flowchart').classList.toggle('active', tab==='flowchart');
    }

    // 페이지 스케치
    function getChecked() {
      return [...document.querySelectorAll('.pg:checked')].map(c => parseInt(c.value));
    }
    function checkRange(a, b) {
      document.querySelectorAll('.pg').forEach(c => {
        const v = parseInt(c.value); c.checked = v >= a && v <= b;
      });
    }
    function checkList(arr) {
      document.querySelectorAll('.pg').forEach(c => {
        c.checked = arr.includes(parseInt(c.value));
      });
    }
    function checkAll()   { document.querySelectorAll('.pg').forEach(c => c.checked = true); }
    function uncheckAll() { document.querySelectorAll('.pg').forEach(c => c.checked = false); }

    document.getElementById('create').onclick = () => {
      const pages = getChecked();
      if (pages.length === 0) { document.getElementById('status-pages').textContent = '페이지를 선택하세요'; return; }
      document.getElementById('create').disabled = true;
      document.getElementById('status-pages').textContent = pages.length + '개 페이지 생성 중...';
      parent.postMessage({ pluginMessage: { type: 'create-pages', pages } }, '*');
    };
    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    // 플로우차트
    document.getElementById('create-fc').onclick = () => {
      document.getElementById('create-fc').disabled = true;
      document.getElementById('status-fc').textContent = '플로우차트 생성 중...';
      parent.postMessage({ pluginMessage: { type: 'create-flowchart' } }, '*');
    };
    document.getElementById('cancel-fc').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        const s = document.getElementById('status-pages');
        s.className = 'status'; s.textContent = msg.count + '개 페이지 생성 완료!';
        document.getElementById('create').disabled = false;
      } else if (msg.type === 'fc-done') {
        const s = document.getElementById('status-fc');
        s.className = 'status'; s.textContent = '플로우차트 생성 완료!';
        document.getElementById('create-fc').disabled = false;
      } else if (msg.type === 'error') {
        const sid = msg.target === 'fc' ? 'status-fc' : 'status-pages';
        const s = document.getElementById(sid);
        s.className = 'status error'; s.textContent = '오류: ' + msg.msg;
        document.getElementById('create').disabled = false;
        document.getElementById('create-fc').disabled = false;
      }
    };
  </script>
</body>
</html>
