<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F9F9; padding: 16px; font-size: 13px; color: #030303;
    }
    h2 { font-size: 14px; font-weight: 700; color: #2E9BFF; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #6D6D6D; margin-bottom: 14px; line-height: 1.5; }
    .section {
      background: white; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 10px; border: 1px solid #E0E0E0;
    }
    .section-title { font-size: 10px; font-weight: 600; color: #A1A1A1;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    label {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12px; margin-bottom: 7px; cursor: pointer;
    }
    label:last-child { margin-bottom: 0; }
    input[type="checkbox"] { width: 13px; height: 13px; margin-top: 1px; accent-color: #2E9BFF; flex-shrink: 0; }
    .label-content { display: flex; flex-direction: column; gap: 1px; }
    .label-title { font-weight: 600; }
    .label-desc { font-size: 10px; color: #6D6D6D; }
    .badge { font-size: 9px; background: #FFE8E8; color: #FF5247;
      border-radius: 3px; padding: 1px 4px; display: inline-block; margin-left: 4px; }
    .step-box {
      background: #F0F7FF; border-radius: 6px; padding: 10px 12px;
      margin-bottom: 10px; font-size: 11px; color: #2E58FF; line-height: 1.8;
    }
    .btn-group { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #2E9BFF; color: white; }
    .btn-cancel  { background: #F2F2F2; color: #6D6D6D; }
    .status { font-size: 11px; color: #3AD1A9; margin-top: 8px; min-height: 14px; text-align: center; }
    .status.error { color: #FF5247; }
  </style>
</head>
<body>
  <h2>DS 신규 컴포넌트 등록</h2>
  <p class="sub">디자인 시스템 파일(wygEtCwUqQJ9p06qsDnBJF)에서 실행하세요.<br>생성 후 수동으로 "Create Component" 처리가 필요합니다.</p>

  <div class="section">
    <div class="section-title">등록할 컴포넌트</div>
    <label>
      <input type="checkbox" id="bottomNav" checked>
      <div class="label-content">
        <span class="label-title">Bottom Navigation Bar <span class="badge">HIGH</span></span>
        <span class="label-desc">Active Tab=홈|고객|플랜|리포트|더보기 · 5 variants · 375×84pt</span>
      </div>
    </label>
    <label>
      <input type="checkbox" id="assetCard" checked>
      <div class="label-content">
        <span class="label-title">Asset Summary Card <span class="badge">HIGH</span></span>
        <span class="label-desc">Type=Default|Compact|Skeleton · 3 variants · 335pt</span>
      </div>
    </label>
    <label>
      <input type="checkbox" id="quickTile" checked>
      <div class="label-content">
        <span class="label-title">Quick Menu Tile</span>
        <span class="label-desc">Color×State · 8 variants · 160×96pt</span>
      </div>
    </label>
  </div>

  <div class="step-box">
    생성 후 처리 순서<br>
    1. 생성된 프레임 선택<br>
    2. 우클릭 → Create Component<br>
    3. Component Set 내에서 Variant 합치기<br>
    4. 디자인 시스템 페이지로 이동
  </div>

  <div class="btn-group">
    <button class="btn-primary" id="register">프레임 생성</button>
    <button class="btn-cancel"  id="cancel">취소</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    document.getElementById('register').onclick = () => {
      const btn = document.getElementById('register');
      btn.disabled = true;
      document.getElementById('status').textContent = '생성 중...';
      parent.postMessage({
        pluginMessage: {
          type: 'register',
          bottomNav: document.getElementById('bottomNav').checked,
          assetCard: document.getElementById('assetCard').checked,
          quickTile: document.getElementById('quickTile').checked,
        }
      }, '*');
    };
    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      const s = document.getElementById('status');
      if (msg.type === 'done') {
        s.className = 'status';
        s.textContent = `${msg.count}개 프레임 생성 완료 — Create Component 처리해주세요`;
        document.getElementById('register').disabled = false;
      } else if (msg.type === 'error') {
        s.className = 'status error';
        s.textContent = '오류: ' + msg.msg;
        document.getElementById('register').disabled = false;
      }
    };
  </script>
</body>
</html>
