<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F9F9;
      padding: 16px;
      font-size: 13px;
      color: #030303;
    }
    h2 { font-size: 14px; font-weight: 700; color: #2E9BFF; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #6D6D6D; margin-bottom: 14px; }
    .section {
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid #E0E0E0;
    }
    .section-title {
      font-size: 10px; font-weight: 600; color: #A1A1A1;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; margin-bottom: 5px; cursor: pointer;
    }
    label:last-child { margin-bottom: 0; }
    input[type="checkbox"] { width: 13px; height: 13px; accent-color: #2E9BFF; }
    .badge {
      font-size: 9px; background: #E8F4FF; color: #2E9BFF;
      border-radius: 3px; padding: 1px 4px; margin-left: auto;
    }
    .badge.new { background: #FFE8E8; color: #FF5247; }
    .btn-group { display: flex; gap: 8px; margin-top: 2px; }
    button {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #2E9BFF; color: white; }
    .btn-cancel  { background: #F2F2F2; color: #6D6D6D; }
    .status { font-size: 11px; color: #3AD1A9; margin-top: 8px; min-height: 16px; text-align: center; }
  </style>
</head>
<body>
  <h2>BetterWealth 홈 화면 생성</h2>
  <p class="sub">375 x 812pt · 디자인 시스템 토큰 적용</p>

  <div class="section">
    <div class="section-title">포함할 섹션</div>
    <label><input type="checkbox" id="topnav"   checked> Top Navigation Bar</label>
    <label><input type="checkbox" id="greeting" checked> 인사말 영역</label>
    <label><input type="checkbox" id="asset"    checked> 자산 현황 카드 <span class="badge new">★신규</span></label>
    <label><input type="checkbox" id="menu"     checked> 빠른 메뉴 2×2 <span class="badge new">★신규</span></label>
    <label><input type="checkbox" id="divider"  checked> 섹션 구분선</label>
    <label><input type="checkbox" id="activity" checked> 최근 활동 리스트</label>
    <label><input type="checkbox" id="bottomnav"checked> Bottom Navigation <span class="badge new">★신규</span></label>
  </div>

  <div class="btn-group">
    <button class="btn-primary" id="create">생성하기</button>
    <button class="btn-cancel"  id="cancel">취소</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    document.getElementById('create').onclick = () => {
      document.getElementById('status').textContent = '생성 중...';
      document.getElementById('create').disabled = true;
      parent.postMessage({
        pluginMessage: {
          type: 'create-home-screen',
          options: {
            topNav:    document.getElementById('topnav').checked,
            greeting:  document.getElementById('greeting').checked,
            asset:     document.getElementById('asset').checked,
            quickMenu: document.getElementById('menu').checked,
            divider:   document.getElementById('divider').checked,
            activity:  document.getElementById('activity').checked,
            bottomNav: document.getElementById('bottomnav').checked,
          }
        }
      }, '*');
    };
    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (msg && msg.type === 'done') {
        document.getElementById('status').textContent = msg.text;
        document.getElementById('create').disabled = false;
      }
    };
  </script>
</body>
</html>
